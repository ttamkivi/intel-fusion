<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; style-src 'unsafe-inline'; script-src 'unsafe-inline'">
    <title>Chat Simulator - Multi-Scenario</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #1a1a1a;
            color: #e0e0e0;
            height: 100vh;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        .header {
            background-color: #0d0d0d;
            border-bottom: 2px solid #4a9eff;
            padding: 12px 16px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 12px;
        }

        .header-title {
            font-size: 18px;
            font-weight: bold;
            color: #4a9eff;
        }

        .header-controls {
            display: flex;
            gap: 12px;
            align-items: center;
            flex-wrap: wrap;
        }

        button {
            background-color: #4a9eff;
            color: white;
            border: none;
            padding: 8px 14px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 13px;
            font-weight: 600;
            transition: all 0.2s;
        }

        button:hover {
            background-color: #3a8edf;
            transform: translateY(-1px);
        }

        button:active {
            transform: translateY(0);
        }

        button:disabled {
            background-color: #666;
            cursor: not-allowed;
            opacity: 0.6;
        }

        button.secondary {
            background-color: #2a2a2a;
            color: #4a9eff;
            border: 1px solid #4a9eff;
        }

        button.secondary:hover {
            background-color: #3a3a3a;
        }

        .lang-button {
            background-color: #2a2a2a;
            color: #4a9eff;
            border: 1px solid #4a9eff;
            padding: 8px 12px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 12px;
            font-weight: 600;
            transition: all 0.2s;
        }

        .lang-button:hover {
            background-color: #3a3a3a;
        }

        .control-group {
            display: flex;
            gap: 8px;
            align-items: center;
        }

        .control-label {
            font-size: 12px;
            color: #aaa;
            font-weight: 600;
        }

        input[type="range"] {
            width: 120px;
            height: 6px;
            border-radius: 3px;
            background: #333;
            outline: none;
            -webkit-appearance: none;
        }

        input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            appearance: none;
            width: 14px;
            height: 14px;
            border-radius: 50%;
            background: #4a9eff;
            cursor: pointer;
        }

        input[type="range"]::-moz-range-thumb {
            width: 14px;
            height: 14px;
            border-radius: 50%;
            background: #4a9eff;
            cursor: pointer;
            border: none;
        }

        select {
            background-color: #2a2a2a;
            color: #4a9eff;
            border: 1px solid #4a9eff;
            padding: 6px 10px;
            border-radius: 4px;
            font-size: 12px;
            cursor: pointer;
        }

        .speed-display {
            font-size: 12px;
            color: #4a9eff;
            min-width: 40px;
        }

        .message-counter {
            font-size: 12px;
            color: #aaa;
            padding: 4px 8px;
            background-color: #2a2a2a;
            border-radius: 4px;
        }

        .container {
            display: flex;
            flex: 1;
            overflow: hidden;
            gap: 12px;
            padding: 12px;
        }

        .chat-section {
            flex: 1;
            display: flex;
            flex-direction: column;
            min-width: 0;
        }

        .sidebar {
            width: 320px;
            background-color: #0d0d0d;
            border: 1px solid #333;
            border-radius: 4px;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .sidebar-title {
            padding: 12px;
            border-bottom: 1px solid #333;
            font-weight: bold;
            color: #4a9eff;
            font-size: 13px;
        }

        .scenario-content {
            flex: 1;
            overflow-y: auto;
            padding: 12px;
            font-size: 12px;
            line-height: 1.5;
        }

        .scenario-content h3 {
            color: #4a9eff;
            margin-top: 12px;
            margin-bottom: 6px;
            font-size: 13px;
        }

        .scenario-content h4 {
            color: #7ab8ff;
            margin-top: 8px;
            margin-bottom: 4px;
            font-size: 12px;
        }

        .scenario-content p {
            color: #bbb;
            margin-bottom: 6px;
        }

        .scenario-content ul {
            margin-left: 16px;
            color: #aaa;
            margin-bottom: 6px;
        }

        .scenario-content li {
            margin-bottom: 3px;
        }

        .chat-feed {
            flex: 1;
            background-color: #0d0d0d;
            border: 1px solid #333;
            border-radius: 4px;
            overflow-y: auto;
            padding: 12px;
            display: flex;
            flex-direction: column;
        }

        .message {
            margin-bottom: 8px;
            padding: 8px 10px;
            background-color: #1a1a1a;
            border-left: 3px solid #4a9eff;
            border-radius: 2px;
            font-size: 12px;
            line-height: 1.4;
            word-wrap: break-word;
        }

        .message-time {
            color: #4a9eff;
            font-weight: 600;
        }

        .message-sender {
            color: #7ab8ff;
            font-weight: 600;
        }

        .message-text {
            color: #bbb;
        }

        .message-link {
            color: #4a9eff;
            text-decoration: none;
            cursor: pointer;
            font-weight: 600;
            background-color: #1a3a4a;
            padding: 2px 6px;
            border-radius: 2px;
            display: inline-block;
        }

        .message-link:hover {
            background-color: #2a4a6a;
            text-decoration: underline;
        }

        .phase-label {
            text-align: center;
            padding: 8px;
            background-color: #2a2a2a;
            color: #4a9eff;
            margin: 6px 0;
            border-radius: 4px;
            font-weight: bold;
            font-size: 11px;
        }

        .modal {
            display: none;
            position: fixed;
            z-index: 1000;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.8);
            animation: fadeIn 0.3s;
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        .modal-content {
            background-color: #1a1a1a;
            margin: 5% auto;
            padding: 24px;
            border: 2px solid #4a9eff;
            border-radius: 4px;
            width: 90%;
            max-width: 700px;
            max-height: 80vh;
            overflow-y: auto;
            color: #e0e0e0;
            font-family: 'Courier New', monospace;
            font-size: 12px;
            line-height: 1.6;
        }

        .modal-close {
            color: #4a9eff;
            float: right;
            font-size: 24px;
            font-weight: bold;
            cursor: pointer;
        }

        .modal-close:hover {
            color: #7ab8ff;
        }

        .nato-message {
            white-space: pre-wrap;
            word-wrap: break-word;
        }

        .nato-header {
            border-bottom: 1px solid #4a9eff;
            margin-bottom: 12px;
            padding-bottom: 8px;
            color: #4a9eff;
            font-weight: bold;
        }

        .empty-state {
            color: #666;
            text-align: center;
            padding: 24px;
            font-size: 13px;
        }

        .editor-textarea {
            width: 100%;
            height: 280px;
            background-color: #0d0d0d;
            color: #bbb;
            border: 1px solid #333;
            padding: 10px;
            border-radius: 4px;
            font-family: 'Courier New', monospace;
            font-size: 11px;
            resize: vertical;
        }

        .editor-label {
            display: block;
            margin-top: 12px;
            margin-bottom: 4px;
            color: #4a9eff;
            font-weight: bold;
            font-size: 12px;
        }

        .editor-input {
            width: 100%;
            background-color: #0d0d0d;
            color: #bbb;
            border: 1px solid #333;
            padding: 8px;
            border-radius: 4px;
            font-size: 12px;
            margin-bottom: 12px;
        }

        .modal-buttons {
            display: flex;
            gap: 8px;
            margin-top: 16px;
            justify-content: flex-end;
        }

        ::-webkit-scrollbar {
            width: 8px;
            height: 8px;
        }

        ::-webkit-scrollbar-track {
            background: #1a1a1a;
        }

        ::-webkit-scrollbar-thumb {
            background: #4a9eff;
            border-radius: 4px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: #7ab8ff;
        }

        @media (max-width: 1200px) {
            .container {
                flex-direction: column;
            }

            .sidebar {
                width: 100%;
                max-height: 200px;
            }
        }
    </style>
</head>
<body>
    <div class="header">
        <div class="header-title" id="headerTitle">⚙️ Chat Simulator</div>
        <div class="header-controls">
            <div class="control-group">
                <label class="control-label" data-i18n="label_scenario">Scenario:</label>
                <select id="scenarioSelect" onchange="changeScenario(this.value)">
                    <option value="northern-shield">Operation NORTHERN SHIELD</option>
                    <option value="island-fortress">Operation ISLAND FORTRESS</option>
                    <option value="gray-storm">Operation GRAY STORM</option>
                    <option value="custom">Custom Scenario</option>
                </select>
            </div>
            <div class="control-group">
                <button id="startBtn" onclick="simulator.start()" data-i18n="btn_start">▶ Start</button>
                <button id="stopBtn" onclick="simulator.stop()" disabled data-i18n="btn_stop">⏹ Stop</button>
            </div>
            <div class="control-group">
                <label class="control-label" data-i18n="label_speed">Speed:</label>
                <input type="range" id="speedSlider" min="1" max="30" value="5" oninput="simulator.updateSpeed(this.value)">
                <span class="speed-display" id="speedDisplay">5.0s</span>
            </div>
            <div class="control-group">
                <label class="control-label" data-i18n="label_phase">Phase:</label>
                <select id="phaseSelect" onchange="simulator.jumpToPhase(this.value)">
                    <option value="1">Phase 1</option>
                    <option value="2">Phase 2</option>
                    <option value="3">Phase 3</option>
                    <option value="4">Phase 4</option>
                </select>
            </div>
            <div class="message-counter">
                <span id="messageCount">0</span> <span data-i18n="label_messages">messages</span>
            </div>
            <button class="secondary" onclick="openIntelFusion()">🔗 Open Intel Fusion</button>
            <button class="secondary" id="editorBtn" onclick="openEditor()">✏️ Editor</button>
            <button class="lang-button" id="langBtn" onclick="toggleLang()">🇬🇧 English</button>
        </div>
    </div>

    <div class="container">
        <div class="chat-section">
            <div class="chat-feed" id="chatFeed">
                <div class="empty-state">Ready to begin. Click "Start" to generate messages.</div>
            </div>
        </div>

        <div class="sidebar">
            <div class="sidebar-title" id="sidebarTitle">📋 Scenario</div>
            <div class="scenario-content" id="scenarioContent"></div>
        </div>
    </div>

    <div id="messageModal" class="modal">
        <div class="modal-content">
            <span class="modal-close" onclick="closeModal()">&times;</span>
            <div id="modalBody" class="nato-message"></div>
        </div>
    </div>

    <div id="editorModal" class="modal">
        <div class="modal-content">
            <span class="modal-close" onclick="closeEditor()">&times;</span>
            <h2 style="color: #4a9eff; margin-bottom: 16px;">Custom Scenario Editor</h2>

            <label class="editor-label">Scenario Name</label>
            <input type="text" id="editorName" class="editor-input" placeholder="e.g., My Custom Scenario">

            <label class="editor-label">Scenario Description (HTML)</label>
            <textarea id="editorDescription" class="editor-textarea" placeholder="Enter HTML scenario description"></textarea>

            <label class="editor-label">Messages (JSON)</label>
            <textarea id="editorMessages" class="editor-textarea" placeholder="[{&quot;phase&quot;:1,&quot;type&quot;:&quot;plain&quot;,&quot;time&quot;:&quot;[06:45]&quot;,&quot;sender&quot;:&quot;UNIT&quot;,&quot;text&quot;:&quot;Message with grid 35V MD 85000 89000&quot;}]"></textarea>

            <div class="modal-buttons">
                <button class="secondary" onclick="closeEditor()">Cancel</button>
                <button onclick="saveCustomScenario()">Save & Load</button>
            </div>
        </div>
    </div>

    <script>
        const LANG = {
            'en': {
                'header_title': '⚙️ Chat Simulator',
                'btn_start': '▶ Start',
                'btn_stop': '⏹ Stop',
                'label_speed': 'Speed:',
                'label_phase': 'Phase:',
                'label_scenario': 'Scenario:',
                'label_messages': 'messages',
                'btn_open': '🔗 Open Intel Fusion',
                'btn_editor': '✏️ Editor',
                'btn_cancel': 'Cancel',
                'btn_save': 'Save & Load',
                'lang_btn': '🇬🇧 English',
                'empty_state': 'Ready to begin. Click "Start" to generate messages.',
            },
            'et': {
                'header_title': '⚙️ Chat Simulator',
                'btn_start': '▶ Käivita',
                'btn_stop': '⏹ Peata',
                'label_speed': 'Kiirus:',
                'label_phase': 'Faas:',
                'label_scenario': 'Stsenaarium:',
                'label_messages': 'sõnumit',
                'btn_open': '🔗 Ava Intel Fusion',
                'btn_editor': '✏️ Redaktor',
                'btn_cancel': 'Tühista',
                'btn_save': 'Salvesta ja laadi',
                'lang_btn': '🇪🇪 Eesti',
                'empty_state': 'Valmis alustama. Vajuta \'Käivita\' sõnumite genereerimiseks.',
            }
        };

        let currentLang = 'en';

        function t(key) {
            return LANG[currentLang][key] || LANG['en'][key] || key;
        }

        function applyLang() {
            document.getElementById('headerTitle').textContent = t('header_title');
            document.getElementById('langBtn').textContent = t('lang_btn');
        }

        function toggleLang() {
            currentLang = currentLang === 'en' ? 'et' : 'en';
            applyLang();
            if (simulator) simulator.updateUI();
        }

        const CONFIG = {
            DEFAULT_SPEED: 5000,
            BROADCAST_CHANNEL_NAME: 'intel-fusion-channel',
        };

        // SCENARIO GENERATORS
        function GeneratorNorthernShield() {

            messages.push({ phase: 3, type: 'plain', time: '[16:31]', sender: 'OP5', text: `Second wave assault, grid ${gridZone} 85800 89600, 2 tank platoons` });

            messages.push({ phase: 4, type: 'plain', time: '[17:15]', sender: 'EST SCOUTS BN', text: `Flank attack, grid ${gridZone} 85200 89800, assault formation` });

        class MessageGenerator {
            constructor(scenario) {
                this.scenario = scenario;
                this.messageCount = 0;
                this.generatedMessages = [];
                this.regenerate();
            }
            regenerate() {
                this.generatedMessages = this.scenario.generator();
                this.messageCount = 0;
            }
            getNext() {
                if (this.messageCount < this.generatedMessages.length) {
                    return this.generatedMessages[this.messageCount++];
                }
                return null;
            }
            reset() { this.messageCount = 0; }
            jumpToPhase(phase) {
                const phaseMap = {
                    '1': (msg) => msg.phase === 1,
                    '2': (msg) => msg.phase <= 2,
                    '3': (msg) => msg.phase <= 3,
                    '4': (msg) => true,
                };
                this.messageCount = this.generatedMessages.filter(phaseMap[phase]).length;
            }
        }

        class ChatSimulator {
            constructor() {
                this.isRunning = false;
                this.currentScenario = SCENARIOS['northern-shield'];
                this.messageGenerator = new MessageGenerator(this.currentScenario);
                this.speed = CONFIG.DEFAULT_SPEED;
                this.timeoutId = null;
                this.broadcastChannel = null;
                this.displayedMessages = [];

                try {
                    this.broadcastChannel = new BroadcastChannel(CONFIG.BROADCAST_CHANNEL_NAME);
                    this.broadcastChannel.onmessage = (event) => {
                        if (!event.data || event.data.type !== 'INTEL_SCRAPE_REQUEST') return;
                        const fromIndex = event.data.fromIndex || 0;
                        this.broadcastChannel.postMessage({
                            type: 'INTEL_SCRAPE_RESPONSE',
                            messages: this.displayedMessages.slice(fromIndex),
                            totalCount: this.displayedMessages.length,
                            timestamp: new Date().toISOString()
                        });
                    };
                } catch (e) {}
            }

            setScenario(scenarioKey) {
                this.currentScenario = SCENARIOS[scenarioKey];
                this.messageGenerator = new MessageGenerator(this.currentScenario);
                this.reset();
                this.updateUI();
            }

            reset() {
                this.isRunning = false;
                this.messageGenerator.reset();
                this.displayedMessages = [];
                document.getElementById('chatFeed').innerHTML = '<div class="empty-state">Ready to begin.</div>';
                document.getElementById('messageCount').textContent = '0';
                document.getElementById('startBtn').disabled = false;
                document.getElementById('stopBtn').disabled = true;
            }

            updateUI() {
                const name = currentLang === 'et' ? this.currentScenario.nameEt : this.currentScenario.name;
                document.getElementById('sidebarTitle').textContent = '📋 ' + name;
                document.getElementById('scenarioContent').innerHTML = currentLang === 'et' ? this.currentScenario.descriptionEt : this.currentScenario.description;
            }

            start() {
                if (this.isRunning) return;
                this.isRunning = true;
                document.getElementById('startBtn').disabled = true;
                document.getElementById('stopBtn').disabled = false;
                if (this.messageGenerator.messageCount === 0) document.getElementById('chatFeed').innerHTML = '';
                this.scheduleNext();
            }

            stop() {
                this.isRunning = false;
                if (this.timeoutId) clearTimeout(this.timeoutId);
                document.getElementById('startBtn').disabled = false;
                document.getElementById('stopBtn').disabled = true;
            }

            scheduleNext() {
                if (!this.isRunning) return;
                const message = this.messageGenerator.getNext();
                if (!message) {
                    this.stop();
                    return;
                }
                this.displayMessage(message);
                this.timeoutId = setTimeout(() => this.scheduleNext(), this.speed);
            }

            displayMessage(message) {
                const chatFeed = document.getElementById('chatFeed');
                const messageEl = document.createElement('div');
                messageEl.className = 'message';

                if (message.type === 'spotrep' || message.type === 'sitrep') {
                    const idx = (window._natoDetails = window._natoDetails || []).length;
                    window._natoDetails.push(message);

                    const timeSpan = document.createElement('span');
                    timeSpan.className = 'message-time';
                    timeSpan.textContent = message.time;

                    const senderSpan = document.createElement('span');
                    senderSpan.className = 'message-sender';
                    senderSpan.textContent = message.sender;

                    const link = document.createElement('a');
                    link.className = 'message-link';
                    link.href = '#';
                    link.textContent = message.type.toUpperCase() + ' — Click';
                    link.onclick = (e) => {
                        e.preventDefault();
                        showMessage(window._natoDetails[idx]);
                    };

                    messageEl.appendChild(timeSpan);
                    messageEl.appendChild(document.createTextNode(' '));
                    messageEl.appendChild(senderSpan);
                    messageEl.appendChild(document.createTextNode(': '));
                    messageEl.appendChild(link);
                } else {
                    messageEl.innerHTML = `<span class="message-time">${message.time}</span> <span class="message-sender">${message.sender}</span>: <span class="message-text">${message.text}</span>`;
                }

                if (chatFeed.querySelector('.empty-state')) chatFeed.innerHTML = '';
                chatFeed.appendChild(messageEl);
                chatFeed.scrollTop = chatFeed.scrollHeight;

                document.getElementById('messageCount').textContent = this.messageGenerator.messageCount;
                this.displayedMessages.push(`[${message.time.replace(/[\[\]]/g, '')}] ${message.sender}: ${message.text}`);
            }

            updateSpeed(value) {
                this.speed = parseFloat(value) * 1000;
                document.getElementById('speedDisplay').textContent = parseFloat(value).toFixed(1) + 's';
            }

            jumpToPhase(phase) {
                this.messageGenerator.jumpToPhase(phase);
                document.getElementById('chatFeed').innerHTML = '';
                this.displayedMessages = [];
                for (let i = 0; i < this.messageGenerator.messageCount; i++) {
                    this.displayMessage(this.messageGenerator.generatedMessages[i]);
                }
            }
        }

        const simulator = new ChatSimulator();
        simulator.updateUI();

        function changeScenario(scenarioKey) {
            if (scenarioKey === 'custom') {
                simulator.stop();
                openEditor();
            } else {
                simulator.setScenario(scenarioKey);
            }
        }

        function showMessage(message) {
            const modal = document.getElementById('messageModal');
            const modalBody = document.getElementById('modalBody');
            const d = message.details;
            let html = '';
            if (message.type === 'spotrep') {
                html = `FM: ${d.fm}\nTO: ${d.to}\nDTG: ${d.dtg}\nSUBJ: ${d.subj}\n\n1. SIZE: ${d.size}\n2. ACTIVITY: ${d.activity}\n3. LOCATION: ${d.location}\n4. UNIT: ${d.unit}\n5. EQUIPMENT: ${d.equipment}\n\nASSESSMENT: ${d.assessment}`;
            } else if (message.type === 'sitrep') {
                html = `FM: ${d.fm}\nTO: ${d.to}\nDTG: ${d.dtg}\nSUBJ: ${d.subj}\n\nENEMY: ${d.line1}\nFRIENDLY: ${d.line2}\nOTHER: ${d.line3}\n\nASSESSMENT: ${d.assessment}`;
            }
            modalBody.textContent = html;
            modal.style.display = 'block';
        }

        function closeModal() {
            document.getElementById('messageModal').style.display = 'none';
        }

        function openEditor() {
            document.getElementById('editorModal').style.display = 'block';
        }

        function closeEditor() {
            document.getElementById('editorModal').style.display = 'none';
        }

        function saveCustomScenario() {
            const name = document.getElementById('editorName').value.trim();
            const desc = document.getElementById('editorDescription').value.trim();
            const jsonStr = document.getElementById('editorMessages').value.trim();
            if (!name || !desc || !jsonStr) {
                alert('All fields required');
                return;
            }
            try {
                const messages = JSON.parse(jsonStr);
                if (!Array.isArray(messages)) throw new Error('Must be array');
                const custom = {
                    name: name, nameEt: name,
                    phaseLabels: { 1: '🔍 Phase 1', 2: '🚀 Phase 2', 3: '⚔️ Phase 3', 4: '🔄 Phase 4' },
                    phaseLabelsEt: { 1: '🔍 Faas 1', 2: '🚀 Faas 2', 3: '⚔️ Faas 3', 4: '🔄 Faas 4' },
                    description: desc, descriptionEt: desc,
                    generator: () => messages
                };
                SCENARIOS['custom'] = custom;
                simulator.setScenario('custom');
                document.getElementById('scenarioSelect').value = 'custom';
                closeEditor();
            } catch (e) {
                alert('JSON error: ' + e.message);
            }
        }

        function openIntelFusion() {
            window.open('intel_fusion.html', 'IntelFusion', 'width=1400,height=900,left=100,top=100');
        }

        window.onclick = (e) => {
            if (e.target.id === 'messageModal') closeModal();
            if (e.target.id === 'editorModal') closeEditor();
        };

        window.addEventListener('beforeunload', () => {
            if (simulator.broadcastChannel) simulator.broadcastChannel.close();
        });

        applyLang();
    </script>
</body>
</html>
